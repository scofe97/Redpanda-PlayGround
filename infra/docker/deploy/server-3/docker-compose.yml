# ============================================================================
# Server 3 (dev-server-3) — 모니터링 풀 스택
# ============================================================================
# GCP VM: 10.178.0.4 (internal) / 34.22.78.240 (external)
#
# Loki + Tempo + Prometheus + Grafana + Alloy (central)
# 다른 서버의 Alloy sidecar가 이 서버로 로그/트레이스/메트릭을 전송한다.
#
# 사용법:
#   scp -r server-3/ dev-server-3:~/deploy/
#   ssh dev-server-3 "cd ~/deploy && docker compose up -d"
#
# 이 서버를 가장 먼저 배포해야 한다 — 다른 서버의 Alloy가 연결할 대상.
# ============================================================================

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: playground-loki
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  tempo:
    image: grafana/tempo:2.7.1
    container_name: playground-tempo
    command: -config.file=/etc/tempo/config.yaml
    volumes:
      - ./monitoring/tempo-config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # Central Alloy — 원격 OTLP 수신 + 노이즈 필터 + 자체 로그 수집
  alloy:
    image: grafana/alloy:v1.6.1
    container_name: playground-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    ports:
      # OTLP 수신 — 다른 서버의 Alloy/로컬 Spring Boot가 여기로 전송
      - "4317:4317"
      - "4318:4318"
      # Alloy UI
      - "24312:12345"
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: playground-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=3d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:11.5.2
    container_name: playground-grafana
    ports:
      - "${GRAFANA_PORT:-23000}:3000"
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_SERVER_ROOT_URL: "http://34.22.78.240:${GRAFANA_PORT:-23000}"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/provisioning/dashboards/json:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: playground-net
