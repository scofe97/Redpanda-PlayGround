# ============================================================================
# Redpanda Connect — 관측성 전역 설정 (streams 모드 root config)
# ============================================================================
# streams 모드에서 tracer/logger/metrics/http는 파이프라인별이 아닌
# 서비스 전역 설정이다. -o 플래그로 이 파일을 지정한다.
#
# 변경점: tracer 전송 대상이 같은 Docker 네트워크의 alloy → alloy:4318
# ============================================================================

logger:
  level: INFO
  format: logfmt
  add_timestamp: true
  static_fields:
    service: redpanda-connect

metrics:
  prometheus: {}

http:
  enabled: true
  address: "0.0.0.0:4195"

tracer:
  open_telemetry_collector:
    http:
      - address: alloy:4318
    tags:
      service.name: redpanda-connect
