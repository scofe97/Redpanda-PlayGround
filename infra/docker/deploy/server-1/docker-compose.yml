# ============================================================================
# Server 1 (dev-server) — Redpanda + Console + Connect + PostgreSQL + Alloy
# ============================================================================
# GCP VM: 10.178.0.2 (internal) / 34.47.83.38 (external)
#
# 사용법:
#   scp -r server-1/ dev-server:~/deploy/
#   ssh dev-server "cd ~/deploy && docker compose up -d"
#
# 의존성:
#   Server 3 (모니터링)이 먼저 실행되어야 Alloy가 로그/메트릭을 전송할 수 있다.
# ============================================================================

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION}
    container_name: playground-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 2G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_KAFKA_PORT}
      # 핵심 변경: external advertise를 외부IP로 설정하여 로컬 Spring Boot가 연결 가능
      - --advertise-kafka-addr internal://redpanda:9092,external://${EXTERNAL_IP}:${REDPANDA_KAFKA_PORT}
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:${REDPANDA_SCHEMA_REGISTRY_PORT}
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "${REDPANDA_KAFKA_PORT}:${REDPANDA_KAFKA_PORT}"
      - "${REDPANDA_SCHEMA_REGISTRY_PORT}:${REDPANDA_SCHEMA_REGISTRY_PORT}"
      - "${REDPANDA_ADMIN_PORT}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  console:
    image: docker.redpanda.com/redpandadata/console:v2.8.0
    container_name: playground-console
    ports:
      - "${CONSOLE_PORT}:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./console-config.yml:/tmp/config.yml:ro
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  connect:
    image: docker.redpanda.com/redpandadata/connect:4.43.0
    container_name: playground-connect
    ports:
      - "${CONNECT_PORT}:4195"
    volumes:
      - ./connect:/etc/connect:ro
    command: ["streams", "--chilled", "-o", "/etc/connect/observability.yaml", "/etc/connect/jenkins-command.yaml", "/etc/connect/jenkins-webhook.yaml", "/etc/connect/gitlab-webhook.yaml"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      JENKINS_TOKEN: ${JENKINS_TOKEN}
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: playground-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: playground-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    ports:
      - "24312:12345"
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 192M

volumes:
  redpanda-data:
  postgres-data:

networks:
  default:
    name: playground-net
