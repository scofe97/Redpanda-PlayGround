apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: playground
  sources:
    - repoURL: https://github.com/scofe97/Redpanda-PlayGround.git
      targetRevision: main
      ref: values
    - repoURL: https://grafana.github.io/helm-charts
      chart: grafana
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/infra/k8s/monitoring/grafana/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rp-mgm
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
