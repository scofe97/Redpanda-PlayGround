apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground-frontend
  namespace: argocd
spec:
  project: playground
  source:
    repoURL: https://github.com/scofe97/Redpanda-PlayGround.git
    targetRevision: main
    path: infra/k8s/playground-frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: rp-oss
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
