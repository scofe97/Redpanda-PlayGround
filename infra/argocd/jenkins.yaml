apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins
  namespace: argocd
spec:
  project: playground
  sources:
    - repoURL: https://github.com/scofe97/Redpanda-PlayGround.git
      targetRevision: main
      ref: values
    - repoURL: https://charts.jenkins.io
      chart: jenkins
      targetRevision: "*"
      helm:
        valueFiles:
          - $values/infra/k8s/jenkins/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: rp-jenkins
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
