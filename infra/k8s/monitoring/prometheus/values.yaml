# ============================================================================
# Prometheus Helm Chart Values — Redpanda Playground
# ============================================================================
# Chart: prometheus-community/prometheus
# Namespace: rp-mgm
#
# 설치:
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install prometheus prometheus-community/prometheus -n rp-mgm -f values.yaml
#
# 업그레이드:
#   helm upgrade prometheus prometheus-community/prometheus -n rp-mgm -f values.yaml
# ============================================================================

# Prometheus는 저장(TSDB) + PromQL 쿼리 + 알림 규칙 평가만 담당.
# 스크래핑은 Alloy가 수행하여 remote_write로 전달한다.

server:
  retention: "3d"

  # remote_write 수신 활성화 (Alloy → Prometheus)
  extraFlags:
    - "web.enable-lifecycle"
    - "web.enable-remote-write-receiver"

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

  persistentVolume:
    enabled: true
    size: 5Gi
    storageClass: local-path

  # 내부 서비스 (Grafana/Alloy에서 접근)
  service:
    type: ClusterIP

# 커스텀 alert rules (기존 prometheus-rules.yml 변환)
serverFiles:
  alerting_rules.yml:
    groups:
      - name: availability
        rules:
          - alert: RedpandaDown
            expr: up{job="redpanda"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redpanda broker is down"
              description: "Redpanda broker has been unreachable for more than 1 minute."

          - alert: ConnectDown
            expr: up{job=~"connect.*"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redpanda Connect is down"
              description: "Connect pipeline has been unreachable for more than 1 minute."

          - alert: SpringBootDown
            expr: up{job="spring_boot"} == 0
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Spring Boot application is down"
              description: "Spring Boot app has been unreachable for more than 2 minutes."

      - name: performance
        rules:
          - alert: HighConsumerLag
            expr: redpanda_kafka_consumer_group_lag > 1000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High Kafka consumer lag detected"
              description: "Consumer group lag has exceeded 1000 for more than 5 minutes."

          - alert: HighHTTPLatency
            expr: histogram_quantile(0.99, rate(http_server_requests_seconds_bucket[5m])) > 2
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High HTTP latency (p99 > 2s)"
              description: "99th percentile HTTP latency has exceeded 2 seconds."

          - alert: HighErrorRate
            expr: |
              sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
              /
              sum(rate(http_server_requests_seconds_count[5m]))
              > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High HTTP error rate (> 5%)"
              description: "More than 5% of HTTP requests are returning 5xx errors."

      - name: resources
        rules:
          - alert: TempoHighMemory
            expr: container_memory_working_set_bytes{container="tempo"} > 858993459
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Tempo memory usage high (> 800MB)"
              description: "Tempo is using more than 800MB of memory. OOM risk with 1GB limit."

      - name: business
        rules:
          - alert: DLQAccumulating
            expr: rate(output_error[5m]) > 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "DLQ messages accumulating"
              description: "Connect is sending messages to DLQ for more than 10 minutes."

          - alert: PipelineStuckInProgress
            expr: |
              (time() - max(output_sent{job=~"connect.*"}) > 300)
              and on() (rate(input_received[5m]) > 0)
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pipeline stuck - receiving but not sending"
              description: "Connect is receiving messages but hasn't sent any in 5 minutes."

# ---- 불필요한 서브컴포넌트 비활성화 ----
# Alloy가 수집 담당이므로 node-exporter, pushgateway 등 불필요
alertmanager:
  enabled: false

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false
