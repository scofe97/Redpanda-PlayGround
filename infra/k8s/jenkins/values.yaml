# ============================================================================
# Jenkins Helm Chart Values — Redpanda Playground
# ============================================================================
# Chart: jenkins/jenkins (https://charts.jenkins.io)
# Namespace: rp-jenkins
#
# 설치:
#   helm repo add jenkins https://charts.jenkins.io && helm repo update
#   kubectl create configmap jenkins-pipelines -n rp-jenkins \
#     --from-file=Jenkinsfile=infra/k8s/jenkins/jobs/Jenkinsfile \
#     --from-file=Jenkinsfile-deploy=infra/k8s/jenkins/jobs/Jenkinsfile-deploy
#   helm install jenkins jenkins/jenkins -n rp-jenkins -f values.yaml -f values-local.yaml
#
# 업그레이드:
#   helm upgrade jenkins jenkins/jenkins -n rp-jenkins -f values.yaml -f values-local.yaml
# ============================================================================

controller:
  image:
    tag: "lts-jdk17"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

  systemMessage: "Redpanda Playground - Jenkins CI/CD (K8s Helm)"

  javaOpts: >-
    -Xmx1g -Xms512m
    -Dfile.encoding=UTF-8
    -Dsun.jnu.encoding=UTF-8

  serviceType: NodePort
  nodePort: 31080
  jenkinsUrl: "http://34.47.74.0:31080/"

  # dev-server-2에 스케줄링 (Docker Jenkins/GitLab 제거 후 여유 확보)
  nodeSelector:
    role: worker

  # ---- 플러그인 ----
  installPlugins:
    - configuration-as-code:latest
    - cloudbees-folder:latest
    - job-dsl:latest
    - workflow-job:latest
    - workflow-cps:latest
    - workflow-basic-steps:latest
    - workflow-durable-task-step:latest
    - workflow-step-api:latest
    - workflow-aggregator:latest
    - pipeline-model-definition:latest
    - pipeline-stage-step:latest
    - pipeline-input-step:latest
    - git:latest
    - pipeline-stage-view:latest
    - kubernetes:latest

  # ---- 환경변수 ----
  containerEnv:
    - name: CONNECT_WEBHOOK_URL
      value: "http://connect.rp-oss.svc.cluster.local:4195/jenkins-webhook/webhook/jenkins"

  # ---- Init Groovy Scripts ----
  # /usr/share/jenkins/ref/init.groovy.d/ 에 마운트됨
  initScripts:
    disable-csrf: |
      import jenkins.model.Jenkins
      def instance = Jenkins.instance
      instance.setCrumbIssuer(null)
      instance.save()

    webhook-listener: |
      import hudson.model.Run
      import hudson.model.TaskListener
      import hudson.model.ParametersAction
      import hudson.model.listeners.RunListener

      def WEBHOOK_URL = System.getenv('CONNECT_WEBHOOK_URL') ?: 'http://connect:4195/jenkins-webhook/webhook/jenkins'

      RunListener.all().add(new RunListener<Run>() {
          @Override
          void onCompleted(Run run, TaskListener listener) {
              def paramsAction = run.getAction(ParametersAction)
              def executionId  = paramsAction?.getParameter('EXECUTION_ID')?.value
              if (!executionId) return

              def stepOrder  = paramsAction?.getParameter('STEP_ORDER')?.value ?: '0'
              def result      = run.result?.toString() ?: 'UNKNOWN'
              def buildNumber = run.number
              def jobName     = run.parent.fullName
              def duration    = run.duration
              def url         = run.absoluteUrl ?: ''

              def payload = """\
                  {
                    "executionId": "${executionId}",
                    "stepOrder":   ${stepOrder},
                    "result":      "${result}",
                    "buildNumber": ${buildNumber},
                    "jobName":     "${jobName}",
                    "duration":    ${duration},
                    "url":         "${url}"
                  }""".stripIndent()

              try {
                  def conn = new URL(WEBHOOK_URL).openConnection() as HttpURLConnection
                  conn.requestMethod  = 'POST'
                  conn.connectTimeout = 5000
                  conn.readTimeout    = 5000
                  conn.doOutput       = true
                  conn.setRequestProperty('Content-Type', 'application/json')
                  conn.outputStream.withWriter('UTF-8') { it.write(payload) }
                  def responseCode = conn.responseCode
                  listener.logger.println("[WEBHOOK] Sent to Connect (HTTP ${responseCode}): ${result}")
              } catch (Exception e) {
                  listener.logger.println("[WEBHOOK] delivery failed (Connect may be down): ${e.message}")
              }
          }
      })

  # ---- JCasC (Configuration as Code) ----
  JCasC:
    configScripts:
      system-config: |
        security:
          globalJobDslSecurityConfiguration:
            useScriptSecurity: false

      jobs-config: |
        jobs:
          - script: |
              def buildScript = '''\
              pipeline {
                  agent any
                  parameters {
                      string(name: 'GIT_URL', defaultValue: '', description: 'Git repository URL')
                      string(name: 'BRANCH', defaultValue: 'main', description: 'Git branch')
                      string(name: 'NEXUS_URL', defaultValue: '', description: 'Nexus URL')
                      string(name: 'GROUP_ID', defaultValue: '', description: 'Maven Group ID')
                      string(name: 'ARTIFACT_ID', defaultValue: '', description: 'Maven Artifact ID')
                      string(name: 'VERSION', defaultValue: '1.0.0', description: 'Artifact version')
                      string(name: 'PACKAGING', defaultValue: 'war', description: 'Packaging type')
                  }
                  stages {
                      stage('Init') {
                          steps {
                              echo '============================================'
                              echo '  [TEST PIPELINE] Redpanda Playground Build'
                              echo '============================================'
                              echo "Execution ID : ^${env.EXECUTION_ID}"
                              echo "Step Order   : ^${env.STEP_ORDER}"
                              echo "GIT_URL      : ^${params.GIT_URL ?: '(simulation)'}"
                              echo "BRANCH       : ^${params.BRANCH}"
                              echo "Build Number : ^${env.BUILD_NUMBER}"
                              echo "Workspace    : ^${env.WORKSPACE}"
                              echo '--------------------------------------------'
                          }
                      }
                      stage('Git Clone') {
                          steps {
                              script {
                                  if (params.GIT_URL) {
                                      echo "[REAL] Git Clone: ^${params.GIT_URL} (branch: ^${params.BRANCH})"
                                      sh 'rm -rf project'
                                      def cloneUrl = params.GIT_URL
                                      def gitToken = env.GITLAB_TOKEN
                                      if (gitToken && cloneUrl.startsWith('http')) {
                                          cloneUrl = cloneUrl.replaceFirst('http(s?)://', "http\\$1://oauth2:^${gitToken}@")
                                      }
                                      sh "git clone -b ^${params.BRANCH} ^${cloneUrl} project"
                                      sh 'ls -la project/'
                                  } else {
                                      echo '[SIM] Git Clone simulation'
                                      sleep 2
                                  }
                              }
                          }
                      }
                      stage('Build') {
                          steps {
                              script {
                                  if (params.GIT_URL) {
                                      echo '[REAL] Building from source...'
                                      sh 'find project/ -type f | head -20'
                                  } else {
                                      echo '[SIM] Creating dummy artifact...'
                                  }
                                  // Create artifact file (real or dummy)
                                  def artifactName = "^${params.ARTIFACT_ID ?: 'app'}-^${params.VERSION ?: '1.0.0'}.^${params.PACKAGING ?: 'war'}"
                                  sh "echo 'Built at ^${new Date()} from ^${params.GIT_URL ?: 'simulation'}' > ^${artifactName}"
                                  sh "ls -la ^${artifactName}"
                                  echo "[BUILD] Artifact created: ^${artifactName}"
                              }
                          }
                      }
                      stage('Upload to Nexus') {
                          steps {
                              script {
                                  def nexusUrl = params.NEXUS_URL
                                  def groupId = params.GROUP_ID
                                  def artifactId = params.ARTIFACT_ID ?: 'app'
                                  def version = params.VERSION ?: '1.0.0'
                                  def packaging = params.PACKAGING ?: 'war'
                                  def artifactName = "^${artifactId}-^${version}.^${packaging}"

                                  if (nexusUrl && groupId) {
                                      def groupPath = groupId.replace('.', '/')
                                      def uploadUrl = "^${nexusUrl}/repository/maven-releases/^${groupPath}/^${artifactId}/^${version}/^${artifactName}"
                                      echo "[NEXUS] Uploading to: ^${uploadUrl}"
                                      sh "curl -sf -u admin:playground1234! --upload-file ^${artifactName} '^${uploadUrl}'"
                                      echo "[NEXUS] Upload SUCCESS: ^${artifactName}"
                                  } else {
                                      echo '[NEXUS] SKIP: NEXUS_URL or GROUP_ID not provided'
                                  }
                              }
                          }
                      }
                  }
                  post {
                      always {
                          echo '============================================'
                          echo "  Result: ^${currentBuild.currentResult}"
                          echo '============================================'
                      }
                  }
              }
              '''.stripIndent()

              def deployScript = '''\
              pipeline {
                  agent any
                  parameters {
                      string(name: 'DEPLOY_TARGET', defaultValue: '', description: 'Deploy target info')
                      string(name: 'ARTIFACT_URL', defaultValue: '', description: 'Artifact URL from Nexus')
                  }
                  stages {
                      stage('Init') {
                          steps {
                              echo '============================================'
                              echo '  [TEST PIPELINE] Redpanda Playground Deploy'
                              echo '============================================'
                              echo "Execution ID  : ^${env.EXECUTION_ID}"
                              echo "Step Order    : ^${env.STEP_ORDER}"
                              echo "Deploy Target : ^${params.DEPLOY_TARGET ?: '(unknown)'}"
                              echo "Build Number  : ^${env.BUILD_NUMBER}"
                              echo '--------------------------------------------'
                          }
                      }
                      stage('Download Artifact') {
                          steps {
                              script {
                                  def artifactUrl = params.ARTIFACT_URL ?: env.ARTIFACT_URL
                                  if (artifactUrl) {
                                      echo "[DEPLOY] Downloading: ^${artifactUrl}"
                                      sh "curl -sf -u admin:playground1234! -O '^${artifactUrl}'"
                                      echo '[DEPLOY] Download complete'
                                      sh 'ls -la *.war *.jar *.zip 2>/dev/null || ls -la'
                                  } else {
                                      echo '[DEPLOY] SKIP: No ARTIFACT_URL provided'
                                  }
                              }
                          }
                      }
                      stage('Verify') {
                          steps {
                              script {
                                  sh 'echo "=== Downloaded files ===" && ls -la && echo "=== File contents ===" && cat *.war *.jar 2>/dev/null || echo "(binary file)"'
                              }
                          }
                      }
                  }
                  post {
                      always {
                          echo '============================================'
                          echo "  Result: ^${currentBuild.currentResult}"
                          echo '============================================'
                      }
                  }
              }
              '''.stripIndent()

              pipelineJob('playground-build') {
                description('Redpanda Playground - Build Pipeline')
                parameters {
                  stringParam('GIT_URL', '', 'Git repository URL (optional)')
                  stringParam('BRANCH', 'main', 'Git branch')
                  stringParam('NEXUS_URL', '', 'Nexus URL')
                  stringParam('GROUP_ID', '', 'Maven Group ID')
                  stringParam('ARTIFACT_ID', '', 'Maven Artifact ID')
                  stringParam('VERSION', '1.0.0', 'Artifact version')
                  stringParam('PACKAGING', 'war', 'Packaging type')
                }
                definition {
                  cps {
                    script(buildScript)
                    sandbox(true)
                  }
                }
              }
              pipelineJob('playground-deploy') {
                description('Redpanda Playground - Deploy Pipeline')
                parameters {
                  stringParam('DEPLOY_TARGET', 'staging', 'Deploy target environment')
                  stringParam('ARTIFACT_URL', '', 'Artifact URL from Nexus')
                }
                definition {
                  cps {
                    script(deployScript)
                    sandbox(true)
                  }
                }
              }

  # ---- 관리자 계정 ----
  # values-local.yaml에서 password 오버라이드
  admin:
    username: admin

# ---- K8s Agent ----
agent:
  enabled: true
  defaultsProviderTemplate: "default"
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # 최대 동시 Agent Pod 수 (Phase 2: 3병렬 x 2배치)
  containerCap: 3
  image:
    repository: "jenkins/inbound-agent"
    tag: "latest-jdk17"

# ---- 퍼시스턴스 ----
persistence:
  enabled: true
  size: 10Gi
