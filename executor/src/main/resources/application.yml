server:
  port: 8071

spring:
  application:
    name: executor
  autoconfigure:
    exclude:
      - io.github.springwolf.core.configuration.SpringwolfAutoConfiguration
      - io.github.springwolf.plugins.kafka.configuration.SpringwolfKafkaAutoConfiguration
      - io.github.springwolf.bindings.kafka.configuration.SpringwolfKafkaBindingAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5432/playground?currentSchema=executor
    username: ${DB_USERNAME:playground}
    password: ${DB_PASSWORD:playground}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET search_path TO executor,public
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: executor
  flyway:
    enabled: true
    schemas: executor
    locations: classpath:db/migration
    clean-disabled: false
    clean-on-validation-error: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:19092}
    consumer:
      group-id: executor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.ByteArraySerializer

executor:
  max-batch-size: 5
  job-max-retries: 2
  dispatch-interval-ms: 3000
  dispatch-initial-delay-ms: 1000
  job-timeout-minutes: 30
  timeout-check-interval-ms: 60000
  timeout-check-initial-delay-ms: 10000
  log-path: /tmp/executor-logs
  submitted-stale-seconds: 30
  submitted-check-interval-ms: 10000
  submitted-check-initial-delay-ms: 5000
  running-stale-minutes: 10
  queued-stale-seconds: 60
  queued-check-interval-ms: 15000
  queued-check-initial-delay-ms: 5000
  scheduler-pool-size: 4
  jenkins-health-staleness-minutes: 3

outbox:
  poll-interval-ms: 500
  poll-initial-delay-ms: 1000

logging:
  level:
    com.study.playground.executor: DEBUG
