# ============================================================================
# Redpanda → Jenkins API 커맨드 파이프라인
# ============================================================================
# 역할: Kafka 토픽(playground.pipeline.commands.jenkins)에서 Jenkins 빌드 커맨드를
#       읽어 Jenkins REST API(buildWithParameters)로 전달한다.
#
# 흐름: Redpanda 토픽 → URL 조합 → HTTP 호출(branch+http) → 에러 분류(switch)
#
# 왜 Spring Boot가 아닌 Connect로 구현하는가:
#   Jenkins API 호출은 단순 HTTP 변환이다. Spring Boot로 구현하면
#   KafkaListener + WebClient + 재시도 + 에러 핸들링 코드가 필요하지만,
#   Connect는 YAML 설정만으로 동일한 결과를 얻을 수 있다.
#   또한 Connect 파이프라인은 애플리케이션 재배포 없이 수정 가능하다.
#
# 에러 분류 전략:
#   - 5xx/429(서버 에러, 레이트리밋) → throw()로 재시도 대상 마킹
#   - 4xx(클라이언트 에러) → 재시도 무의미, 즉시 DLQ 직행
#   branch+http 프로세서를 사용하는 이유는 errored()/error() 함수로
#   HTTP 응답 코드를 검사할 수 있기 때문이다.
#
# 관련 파이프라인:
#   - gitlab-webhook.yaml: GitLab → Redpanda (입력 방향)
#   - jenkins-webhook.yaml: Jenkins → Redpanda (콜백 수신)
#
# 관련 코드:
#   - PipelineCommandProducer.java: 이 토픽에 커맨드를 발행하는 Producer
#   - JenkinsCloneAndBuildStep.java: GIT_CLONE/BUILD 스텝에서 커맨드 발행
#   - RealDeployStep.java: DEPLOY 스텝에서 커맨드 발행
# ============================================================================

# --- 로깅 설정 ---
# logfmt: 구조화 로그 포맷. Loki/Promtail로 수집 시 필드 파싱이 용이하다.
# static_fields.service: 여러 Connect 인스턴스 로그를 구분하는 식별자.
logger:
  level: INFO
  format: logfmt
  add_timestamp: true
  static_fields:
    service: connect-jenkins-command

# --- 메트릭 설정 ---
# Prometheus가 /metrics 엔드포인트를 scrape한다.
# 주요 메트릭: input_received_total, output_sent_total, output_error_total
metrics:
  prometheus: {}

# --- 관리 HTTP 엔드포인트 ---
# /ping: liveness 체크 (K8s livenessProbe 대상)
# /ready: readiness 체크 (K8s readinessProbe 대상)
# /metrics: Prometheus 메트릭
http:
  enabled: true
  address: "0.0.0.0:4195"

# --- 입력: Redpanda 토픽에서 커맨드 수신 ---
# 토픽-스키마 1:1 매칭으로 이 토픽에는 JenkinsBuildCommand만 존재한다.
# eventType 필터가 불필요하다.
input:
  kafka_franz:
    seed_brokers:
      - redpanda:9092
    topics:
      - playground.pipeline.commands.jenkins
    # 컨슈머 그룹 — 동일 그룹 내 인스턴스가 파티션을 분배받아
    # 중복 소비 없이 수평 확장할 수 있다.
    # v4: 토픽 분리로 인한 오프셋 리셋
    consumer_group: connect-jenkins-command-v4
    # false: 최신 오프셋부터 — 과거 커맨드를 재실행하면 Jenkins 빌드가
    # 중복 트리거되므로 최신만 처리한다.
    start_from_oldest: false

# --- 파이프라인: URL 조합 + HTTP 호출 + 에러 분류 ---
pipeline:
  processors:
    # 1단계: Jenkins buildWithParameters URL 조합
    # jobName과 params를 조합하여 Jenkins REST API URL을 만든다.
    # 예: /job/my-build/buildWithParameters?BRANCH=main&TAG=v1.0
    - mapping: |
        let job = this.jobName
        let query = this.params.key_values().map_each(kv -> "%s=%s".format(kv.key, kv.value.escape_url_query())).join("&")

        # output이 아닌 프로세서에서 HTTP 호출하므로 메타데이터에 URL 정보를 저장한다.
        meta jenkins_path = "/job/%s/buildWithParameters?%s".format($job, $query)
        meta execution_id = this.executionId
        meta step_order = this.stepOrder.string()

        # Jenkins buildWithParameters는 쿼리스트링으로 파라미터를 받으므로
        # 요청 본문은 비운다.
        root = ""

    # 2단계: HTTP 호출 전 로그 기록
    # Jenkins API 호출 실패 시 어떤 커맨드였는지 추적하기 위해
    # 호출 전에 컨텍스트를 남긴다.
    - log:
        message: "Jenkins API 호출"
        level: INFO
        fields_mapping: |
          root.execution_id = meta("execution_id")
          root.step_order = meta("step_order")
          root.jenkins_path = meta("jenkins_path")

    # 3단계: HTTP 호출 (branch + http 프로세서)
    # http를 output이 아닌 프로세서로 사용하는 이유는
    # errored()/error() 함수로 응답 코드를 검사하여
    # 5xx/429와 4xx를 분류할 수 있기 때문이다.
    - branch:
        request_map: 'root = ""'
        processors:
          - http:
              url: 'http://jenkins:8080${! meta("jenkins_path") }'
              verb: POST
              headers:
                Content-Type: application/x-www-form-urlencoded
                # 추적용 헤더 — Jenkins access log나 프록시 로그에서
                # 어떤 파이프라인 실행의 어떤 스텝인지 역추적할 수 있다.
                X-Execution-Id: '${! meta("execution_id") }'
                X-Step-Order: '${! meta("step_order") }'
              basic_auth:
                enabled: true
                username: admin
                password: "${JENKINS_TOKEN}"
              timeout: 15s
              # 200/201/202만 성공으로 간주, 나머지는 에러 처리
              successful_on: [200, 201, 202]
        # 성공 시 deleted()로 메시지 폐기 (output으로 전달할 내용 없음)
        # 에러 시 error() 문자열을 root에 저장하여 switch에서 분류
        result_map: |
          root = if errored() { error() } else { deleted() }

    # 4단계: 에러 분류
    # 성공 시 deleted()로 여기에 도달하지 않는다.
    # 에러 문자열에서 HTTP 상태 코드 패턴을 매칭하여 분류한다.
    - switch:
        # 5xx/429: 서버 에러 또는 레이트리밋 → 재시도 대상
        # throw()로 에러를 발생시켜 output retry가 재시도하도록 한다.
        - check: 'this.contains("status 429") || this.contains("status 5")'
          processors:
            - log:
                message: "Jenkins 5xx/429 — 재시도 대상"
                level: WARN
                fields_mapping: |
                  root.execution_id = meta("execution_id")
                  root.error = content().string()
            - mapping: 'root = throw("retryable: " + content().string())'
        # 4xx: 클라이언트 에러 → 재시도 무의미, DLQ 직행
        # throw() 없이 메시지를 그대로 통과시켜 output fallback이
        # retry(drop) 성공 후 종료하도록 한다.
        - processors:
            - log:
                message: "Jenkins 4xx — DLQ 직행"
                level: ERROR
                fields_mapping: |
                  root.execution_id = meta("execution_id")
                  root.step_order = meta("step_order")
                  root.error = content().string()

# --- 출력: 재시도 + DLQ ---
# HTTP 호출은 프로세서에서 이미 완료되었다.
# - 5xx/429 throw() → retry가 잡아서 재시도 (drop은 성공 응답)
# - 4xx (throw 없음) → retry의 drop이 바로 성공 → fallback 미발동
#   하지만 4xx는 switch의 default에서 에러 로그만 남기고 통과하므로
#   output drop으로 정상 종료된다.
# - 5xx/429 재시도 소진 → fallback으로 DLQ 발행
output:
  fallback:
    # 1차: 재시도 후 drop (HTTP 호출은 프로세서에서 완료)
    - retry:
        # 5회 재시도 — Jenkins가 일시적으로 불가용(재시작, GC pause)할 때 버틴다.
        # 무한 재시도하지 않는 이유: Jenkins가 장기간 다운되면
        # 컨슈머 Lag이 무한 증가하고, WebhookTimeoutChecker가
        # 5분 후 파이프라인을 FAILED로 전환하기 때문이다.
        max_retries: 5
        backoff:
          initial_interval: 2s
          max_interval: 30s
        output:
          drop: {}

    # 2차: 재시도 소진 후 DLQ 발행
    # 5회 재시도 모두 실패하면 이 브랜치가 실행된다.
    # DLQ 토픽에 원본 메시지를 보존하여 수동 재처리할 수 있도록 한다.
    # 실패 로그는 switch 프로세서에서 이미 ERROR 레벨로 기록된다.
    - kafka_franz:
        seed_brokers:
          - redpanda:9092
        topic: dlq-pipeline-commands
        key: '${! meta("execution_id") }'
        max_in_flight: 1
