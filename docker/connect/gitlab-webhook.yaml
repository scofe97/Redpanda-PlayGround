# ============================================================================
# GitLab Webhook → Redpanda 인바운드 파이프라인
# ============================================================================
# 역할: GitLab이 push/merge 이벤트 발생 시 보내는 HTTP POST 웹훅을
#       Redpanda 토픽(playground.webhook.inbound)으로 브릿지한다.
#
# 흐름: GitLab → POST /webhook/gitlab → 메시지 정규화 → Redpanda 토픽
#
# 왜 Connect를 쓰는가:
#   Spring Boot에서 직접 웹훅을 받을 수도 있지만, Connect를 사용하면
#   애플리케이션 재배포 없이 파이프라인만 수정할 수 있고,
#   입력(webhook)과 출력(Redpanda)의 결합도를 낮출 수 있다.
#
# 관련 파이프라인:
#   - jenkins-webhook.yaml: Jenkins 웹훅도 동일 토픽으로 수신
#   - jenkins-command.yaml: 토픽 → Jenkins API 호출 (반대 방향)
# ============================================================================

# --- 관측성 설정 ---
# logger, metrics, tracer, http는 observability.yaml(-o 플래그)에서 관리한다.

# --- 입력: GitLab 웹훅 수신 ---
input:
  http_server:
    # GitLab이 POST 요청을 보낼 엔드포인트
    # GitLab 프로젝트 설정 > Webhooks > URL에 이 주소를 등록한다.
    address: 0.0.0.0:4196
    path: /webhook/gitlab
    allowed_verbs:
      - POST
    # 요청 타임아웃 — GitLab은 10초 내 응답이 없으면 실패로 간주한다.
    timeout: 5s

# --- 파이프라인: 메시지 정규화 ---
pipeline:
  processors:
    - mapping: |
        # 모든 웹훅 소스(GitLab, Jenkins 등)를 동일 스키마로 정규화한다.
        # 다운스트림 컨슈머가 소스별 파싱 로직을 분기할 수 있도록
        # webhookSource 필드로 출처를 명시한다.
        root.webhookSource = "GITLAB"
        root.payload = content().string()
        root.headers = @
        root.receivedAt = now()

    # 에러 발생 시 컨텍스트를 로그에 기록한다.
    # 정규화 자체는 실패할 가능성이 낮지만, Kafka 발행 실패 시
    # 어떤 웹훅이 유실되었는지 추적하기 위해 필요하다.
    - catch:
        - log:
            message: "GitLab 웹훅 처리 실패"
            level: ERROR
            fields_mapping: |
              root.error = error()
              root.payload_preview = content().string().slice(0, 200)

# --- 출력: Redpanda 토픽 발행 ---
output:
  # retry로 감싸서 Redpanda 일시 장애 시 자동 재시도한다.
  # 웹훅은 한번 유실되면 GitLab이 재전송하지 않을 수 있으므로
  # Connect 레벨에서 재시도하는 것이 안전하다.
  retry:
    # 최대 5회 재시도 후 실패 — 무한 재시도하면 웹훅 응답이 지연되어
    # GitLab이 타임아웃으로 웹훅을 비활성화할 수 있다.
    max_retries: 5
    backoff:
      initial_interval: 500ms
      max_interval: 10s
    output:
      kafka_franz:
        seed_brokers:
          - redpanda:9092
        topic: playground.webhook.inbound
        # webhookSource를 키로 사용 — 같은 소스의 이벤트가 같은 파티션에 모인다.
        key: ${! json("webhookSource") }
        # 전송 보장: acks=all (모든 replica 확인 후 성공)
        max_in_flight: 1
