services:
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: playground-jenkins
    ports:
      - "${JENKINS_PORT:-29080}:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: -Xmx1g -Xms512m
      CASC_JENKINS_CONFIG: /var/jenkins_home/casc.yaml
    volumes:
      - jenkins-data:/var/jenkins_home
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      - ./jenkins/disable-csrf.groovy:/var/jenkins_home/init.groovy.d/disable-csrf.groovy:ro
    deploy:
      resources:
        limits:
          memory: 1536M

  gitlab:
    image: gitlab/gitlab-ce:17.4.0-ce.0
    container_name: playground-gitlab
    hostname: playground-gitlab
    ports:
      - "${GITLAB_HTTP_PORT:-29180}:${GITLAB_HTTP_PORT:-29180}"
      - "${GITLAB_SSH_PORT:-29122}:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:${GITLAB_HTTP_PORT:-29180}'
        gitlab_rails['initial_root_password'] = 'playground1234!'
        puma['worker_processes'] = 0
        sidekiq['concurrency'] = 5
        prometheus_monitoring['enable'] = false
        gitlab_rails['env'] = { 'MALLOC_CONF' => 'dirty_decay_ms:1000,muzzy_decay_ms:1000' }
    volumes:
      - gitlab-config:/etc/gitlab
      - gitlab-data:/var/opt/gitlab
      - gitlab-logs:/var/log/gitlab
    shm_size: '256m'
    deploy:
      resources:
        limits:
          memory: 4096M

  nexus:
    image: sonatype/nexus3:3.72.0
    container_name: playground-nexus
    ports:
      - "${NEXUS_PORT:-28881}:8081"
    environment:
      INSTALL4J_ADD_VM_PARAMS: -Xms512m -Xmx1g -XX:MaxDirectMemorySize=512m
    volumes:
      - nexus-data:/nexus-data
    deploy:
      resources:
        limits:
          memory: 1228M

  registry:
    image: registry:2
    container_name: playground-registry
    ports:
      - "${REGISTRY_PORT:-25050}:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    deploy:
      resources:
        limits:
          memory: 128M

  registry-ui:
    image: joxit/docker-registry-ui:2.5
    container_name: playground-registry-ui
    ports:
      - "${REGISTRY_UI_PORT:-25051}:80"
    environment:
      REGISTRY_TITLE: Playground Registry
      REGISTRY_URL: http://registry:5000
      SINGLE_REGISTRY: "true"
      DELETE_IMAGES: "true"
    depends_on:
      - registry
    deploy:
      resources:
        limits:
          memory: 30M

volumes:
  jenkins-data:
  gitlab-config:
  gitlab-data:
  gitlab-logs:
  nexus-data:
  registry-data:

networks:
  default:
    name: playground-net
