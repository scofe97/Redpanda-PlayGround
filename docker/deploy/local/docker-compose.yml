# ============================================================================
# Local (macOS) вҖ” Alloy Sidecar
# ============================================================================
# Spring Boot + ReactлҠ” нҳёмҠӨнҠём—җм„ң мӢӨн–ү. Alloyл§Ң DockerлЎң лқ„мӣҢм„ң
# Spring Boot OTLP нҠёл ҲмқҙмҠӨмҷҖ л©”нҠёлҰӯмқ„ Server 3мңјлЎң м „мҶЎн•ңлӢӨ.
#
# мӮ¬мҡ©лІ•:
#   cd docker/deploy/local && docker compose up -d
#   SPRING_PROFILES_ACTIVE=gcp make backend
# ============================================================================

services:
  alloy:
    image: grafana/alloy:v1.6.1
    container_name: playground-alloy-local
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --stability.level=generally-available
    ports:
      # OTLP мҲҳмӢ  вҖ” Spring Boot OTel Agentк°Җ localhost:24318лЎң м „мҶЎ
      - "24317:4317"
      - "24318:4318"
      # Alloy UI
      - "24312:12345"
    volumes:
      - ./monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
    deploy:
      resources:
        limits:
          memory: 128M
