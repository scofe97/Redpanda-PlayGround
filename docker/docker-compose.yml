services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:${REDPANDA_VERSION}
    container_name: playground-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 2G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:${REDPANDA_KAFKA_PORT}
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:${REDPANDA_KAFKA_PORT}
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:${REDPANDA_SCHEMA_REGISTRY_PORT}
      - --advertise-rpc-addr redpanda:33145
    ports:
      - "${REDPANDA_KAFKA_PORT}:${REDPANDA_KAFKA_PORT}"
      - "${REDPANDA_SCHEMA_REGISTRY_PORT}:${REDPANDA_SCHEMA_REGISTRY_PORT}"
      - "${REDPANDA_ADMIN_PORT}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  console:
    image: docker.redpanda.com/redpandadata/console:v2.8.0
    container_name: playground-console
    ports:
      - "${CONSOLE_PORT}:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./console-config.yml:/tmp/config.yml:ro
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  connect:
    image: docker.redpanda.com/redpandadata/connect:4.43.0
    container_name: playground-connect
    ports:
      - "${CONNECT_PORT}:4195"
      - "4197:4197"
    volumes:
      - ./connect:/etc/connect:ro
    command: ["streams", "--chilled", "/etc/connect/*.yaml"]
    environment:
      JENKINS_TOKEN: ${JENKINS_TOKEN}
    depends_on:
      redpanda:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  postgres:
    image: postgres:16-alpine
    container_name: playground-postgres
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  redpanda-data:
  postgres-data:

networks:
  default:
    name: playground-net
