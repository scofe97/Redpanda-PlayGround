# GCP 멀티 서버 프로필
# Server 1 (34.47.83.38)의 Redpanda + PostgreSQL을 바라본다.
# OTel 트레이스는 Server 3 (34.22.78.240)의 Alloy로 직접 전송한다.
#
# 사용법: SPRING_PROFILES_ACTIVE=gcp make backend

spring:
  datasource:
    url: jdbc:postgresql://34.47.83.38:25432/playground
  kafka:
    bootstrap-servers: 34.47.83.38:29092
    properties:
      schema.registry.url: http://34.47.83.38:28081

app:
  connect:
    url: http://34.47.83.38:24195

otel:
  exporter:
    otlp:
      endpoint: http://34.22.78.240:4318
