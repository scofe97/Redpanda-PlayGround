# GCP K8s 프로필
# Server 1 (34.47.83.38)의 K8s 클러스터 서비스를 바라본다.
# 모든 서비스는 NodePort로 접근한다.
#
# 사용법: SPRING_PROFILES_ACTIVE=gcp make backend

spring:
  datasource:
    url: jdbc:postgresql://34.47.83.38:30275/playground
  kafka:
    bootstrap-servers: 34.47.83.38:31092
    properties:
      schema.registry.url: http://34.47.83.38:31081

app:
  connect:
    url: http://34.47.83.38:31195

otel:
  exporter:
    otlp:
      endpoint: http://34.47.83.38:30318
