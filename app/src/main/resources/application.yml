server:
  port: 8080

spring:
  config:
    import: classpath:kafka-defaults.yml
  application:
    name: redpanda-playground
  datasource:
    url: jdbc:postgresql://localhost:25432/playground
    username: ${DB_USERNAME:playground}
    password: ${DB_PASSWORD:playground}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.study.playground.ticket.domain,com.study.playground.pipeline.domain,com.study.playground.common.outbox,com.study.playground.supporttool.domain,com.study.playground.connector.domain
  type-handlers-package: com.study.playground.common.mybatis

app:
  connect:
    url: ${CONNECT_URL:http://localhost:4195}

springwolf:
  enabled: true
  docket:
    info:
      title: Redpanda Playground AsyncAPI
      version: 1.0.0
      description: 배포 파이프라인 이벤트 명세 (Ticket → Pipeline → Webhook)
    servers:
      redpanda:
        protocol: kafka
        host: ${spring.kafka.bootstrap-servers}
    base-package: com.study.playground

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.study.playground: DEBUG
    org.apache.kafka: WARN
    org.mybatis: DEBUG
