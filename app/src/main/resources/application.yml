server:
  port: 8070

spring:
  config:
    import: classpath:kafka-defaults.yml
  application:
    name: redpanda-playground
  datasource:
    url: jdbc:postgresql://localhost:25432/playground
    username: ${DB_USERNAME:playground}
    password: ${DB_PASSWORD:playground}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  type-aliases-package: com.study.playground.ticket.domain,com.study.playground.pipeline.domain,com.study.playground.kafka.outbox,com.study.playground.supporttool.domain,com.study.playground.connector.domain,com.study.playground.preset.domain
  type-handlers-package: com.study.playground.common.mybatis

app:
  connect:
    url: ${CONNECT_URL:http://localhost:4195}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

springwolf:
  enabled: true
  docket:
    info:
      title: Redpanda Playground AsyncAPI
      version: 1.0.0
      description: 배포 파이프라인 이벤트 명세 (Ticket → Pipeline → Webhook)
    servers:
      redpanda:
        protocol: kafka
        host: ${spring.kafka.bootstrap-servers}
    base-package: com.study.playground

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

otel:
  java:
    global-autoconfigure:
      enabled: true
  service:
    name: redpanda-playground
  exporter:
    otlp:
      endpoint: http://localhost:24318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: none

logging:
  level:
    com.study.playground: DEBUG
    com.study.playground.kafka.outbox.OutboxMapper: INFO
    com.study.playground.pipeline.mapper.PipelineStepMapper.findWaitingWebhookStepsOlderThan: INFO
    org.apache.kafka: WARN
    org.mybatis: DEBUG
    org.mybatis.spring.SqlSessionUtils: INFO
    org.mybatis.spring.transaction.SpringManagedTransaction: INFO

outbox:
  batch-size: 50
  poll-interval-ms: 500
  max-retries: 5
  cleanup-retention-days: 7
  cleanup-cron: "0 0 3 * * *"
