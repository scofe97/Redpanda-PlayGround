server:
  port: 8070

spring:
  config:
    import: classpath:kafka-defaults.yml
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  application:
    name: redpanda-playground
  datasource:
    url: jdbc:postgresql://localhost:25432/playground
    username: ${DB_USERNAME:playground}
    password: ${DB_PASSWORD:playground}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        reWriteBatchedInserts: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 20
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  connect:
    url: ${CONNECT_URL:http://localhost:4195}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

springwolf:
  enabled: true
  docket:
    info:
      title: Redpanda Playground AsyncAPI
      version: 1.0.0
      description: 배포 파이프라인 이벤트 명세 (Ticket → Pipeline → Webhook)
    servers:
      redpanda:
        protocol: kafka
        host: ${spring.kafka.bootstrap-servers}
    base-package: com.study.playground

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

otel:
  java:
    global-autoconfigure:
      enabled: true
  service:
    name: redpanda-playground
  exporter:
    otlp:
      endpoint: http://localhost:24318
      protocol: http/protobuf
  metrics:
    exporter: none
  logs:
    exporter: none

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com.study.playground: DEBUG
    org.apache.kafka: WARN

pipeline:
  max-concurrent-jobs: 3
  webhook-timeout-minutes: 5
  job-max-retries: 2
  stale-execution-timeout-minutes: 30
  executor-wait-timeout-minutes: 5

outbox:
  batch-size: 50
  poll-interval-ms: 500
  max-retries: 5
  cleanup-retention-days: 7
  cleanup-cron: "0 0 3 * * *"
